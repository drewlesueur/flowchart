<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flow Chart Detail</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Flow Chart Lab</p>
          <h1 id="detailTitle">Flow chart detail</h1>
        </div>
        <div class="topbar-meta">
          <a class="view-link" href="/">Back to files</a>
          <div class="view-links" aria-label="Renderer views">
            <button id="svgToggle" class="view-toggle is-active" type="button">SVG</button>
            <button id="canvasToggle" class="view-toggle" type="button">Canvas</button>
          </div>
          <button id="saveFile" type="button">Save file</button>
          <button id="resetSample" type="button">Reset file</button>
          <p id="detailMeta">Loading file...</p>
        </div>
      </header>

      <main class="workspace">
        <section class="panel editor-panel">
          <div class="panel-heading">
            <h2>Source</h2>
            <p id="fileNameLabel">Code file</p>
          </div>
          <textarea id="sourceInput" spellcheck="false" aria-label="Source code input"></textarea>
        </section>

        <section class="panel preview-panel">
          <div class="panel-heading">
            <h2 id="previewTitle">SVG Flow Chart</h2>
            <p id="statusText">Ready.</p>
          </div>
          <div class="preview-scroll">
            <div id="previewHost" class="svg-mount canvas-host" aria-live="polite">
              <div id="svgMount"></div>
              <canvas id="chartCanvas" hidden></canvas>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/flowchart-core.js"></script>
    <script src="/detail.js"></script>
  </body>
</html>
