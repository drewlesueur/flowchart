<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrickleScript File</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="app-kicker">TrickleScript</p>
          <h1 id="detailTitle">Flow file</h1>
        </div>
        <div class="app-header-side detail-actions">
          <a class="ghost-link" href="/">Back to files</a>
          <label class="entry-picker">
            <span>Entry</span>
            <select id="entrySelect"></select>
          </label>
          <button id="saveFile" type="button">Save</button>
          <button id="resetSample" type="button" class="secondary-button">Reset</button>
          <p id="detailMeta" class="app-status-copy">Loading file...</p>
        </div>
      </header>

      <main class="detail-layout">
        <section class="panel editor-panel">
          <div class="panel-bar">
            <h2>TrickleScript</h2>
            <p id="fileNameLabel">Code file</p>
          </div>
          <textarea id="sourceInput" spellcheck="false" aria-label="TrickleScript source"></textarea>
        </section>

        <section class="panel chart-panel">
          <div class="panel-bar">
            <h2>Flowchart</h2>
            <p id="statusText">Ready</p>
          </div>
          <div class="chart-scroll">
            <div id="previewHost" class="chart-host" aria-live="polite">
              <div id="svgMount"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/tricklescript.js"></script>
    <script src="/tricklescript-renderer.js"></script>
    <script src="/detail.js"></script>
  </body>
</html>
