<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flow Chart Lab Canvas</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Flow Chart Lab</p>
          <h1>Paste code. Inspect the control flow.</h1>
        </div>
        <div class="topbar-meta">
          <nav class="view-links" aria-label="Renderer views">
            <a class="view-link" href="/">SVG view</a>
            <a class="view-link is-active" href="/canvas.html">Canvas view</a>
          </nav>
          <button id="resetSample" type="button">Load sample</button>
          <p>Canvas is generated locally in your browser.</p>
        </div>
      </header>

      <main class="workspace">
        <section class="panel editor-panel">
          <div class="panel-heading">
            <h2>Source</h2>
            <p>JavaScript-style control flow works best.</p>
          </div>
          <textarea id="sourceInput" spellcheck="false" aria-label="Source code input"></textarea>
        </section>

        <section class="panel preview-panel">
          <div class="panel-heading">
            <h2>Canvas Flow Chart</h2>
            <p id="statusText">Ready.</p>
          </div>
          <div class="preview-scroll">
            <div id="canvasHost" class="svg-mount canvas-host" aria-live="polite">
              <canvas id="chartCanvas"></canvas>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/flowchart-core.js"></script>
    <script src="/canvas-app.js"></script>
  </body>
</html>
