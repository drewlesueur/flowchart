<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow 5</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #111525;
  color: #e8eefc;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 18px;
  background: #1a223d;
  border-bottom: 1px solid #26345d;
}
h1 {
  font-size: 16px;
  color: #ff8f6b;
}
.status {
  margin-left: auto;
  font-size: 12px;
  color: #99a7ca;
}
.container {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(300px, 38%) 1fr;
}
.left, .right {
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.left {
  border-right: 1px solid #26345d;
}
.pane-title {
  padding: 8px 12px;
  background: #1a223d;
  border-bottom: 1px solid #26345d;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 12px;
  color: #99a7ca;
}
textarea {
  flex: 1;
  width: 100%;
  resize: none;
  border: none;
  outline: none;
  background: #0b1020;
  color: #e8eefc;
  padding: 14px;
  font: 14px/1.5 "Courier New", monospace;
  tab-size: 2;
}
.right {
  background: #0f1426;
}
.viewport {
  position: relative;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(113, 182, 255, 0.12), transparent 28%),
    linear-gradient(180deg, #10172c, #0b1020);
  cursor: grab;
  touch-action: none;
}
.viewport:active {
  cursor: grabbing;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.helper {
  padding: 8px 12px;
  font-size: 12px;
  color: #99a7ca;
  border-bottom: 1px solid #26345d;
  background: rgba(26, 34, 61, 0.7);
}
@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
    grid-template-rows: 42vh 1fr;
  }
  .left {
    border-right: none;
    border-bottom: 1px solid #26345d;
  }
}
</style>
</head>
<body>
<header>
  <h1>Flow 5</h1>
  <div>Indented Bubble Prototype</div>
  <div class="status" id="status">Ready</div>
</header>
<div class="container">
  <section class="left">
    <div class="pane-title">Nested Source</div>
    <textarea id="source" spellcheck="false">Node1
  InnerNode1
  InnerNode2
    more here
    still deeper
      final layer
        level 6
          level 7
            level 8
              level 9
                level 10
Node2
  Child A
  Child B
    Child B.1
    Child B.2
      Child B.2.a
      Child B.2.b
        Child B.2.b.i
        Child B.2.b.ii
QuickNode
Tiny
Ladder Start
  rung 1
    rung 2
      rung 3
        rung 4
          rung 5
            rung 6
              rung 7
                rung 8
                  rung 9
                    rung 10
Short Burst
  one
  two
  three
Mixed Root
  short child
  medium child
    medium child deeper
      medium child deeper still
  long child
    long child 2
      long child 3
        long child 4
          long child 5
            long child 6
              long child 7
                long child 8
Chain Cluster
  A
    A2
      A3
  B
    B2
  C
    C2
      C3
        C4
          C5
Last Root
  alpha
  beta
    gamma
      delta
        epsilon
  zeta</textarea>
  </section>
  <section class="right">
    <div class="pane-title">Bubble View</div>
    <div class="helper">Scroll to zoom. Drag to pan. More nested bubbles appear as you zoom in.</div>
    <div class="viewport" id="viewport">
      <canvas id="canvas"></canvas>
    </div>
  </section>
</div>
<script>
(function() {
  const sourceEl = document.getElementById("source");
  const viewportEl = document.getElementById("viewport");
  const canvas = document.getElementById("canvas");
  const statusEl = document.getElementById("status");
  const ctx = canvas.getContext("2d");

  const NODE_W = 220;
  const NODE_H = 74;
  const HEADER_H = 18;
  const INNER_PAD_X = 1;
  const INNER_PAD_Y = 3;
  const CHILD_GAP = 0;
  const ROOT_GAP = 24;
  const MARGIN = 56;
  const LABEL_PILL_W = 104;
  const LABEL_PILL_PAD_X = 8;
  const LABEL_PILL_PAD_Y = 4;

  const camera = {
    zoom: 1,
    panX: 0,
    panY: 24,
    dpr: 1
  };

  let tree = [];
  let rootLayout = [];
  let world = { width: 900, height: 700 };
  let drag = null;
  let rafId = 0;
  let resizeObserver = null;

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function detailDepth(zoom) {
    if (zoom < 0.9) return 0;
    return 1 + Math.floor(Math.log2(zoom / 0.9));
  }

  function truncate(value, max) {
    return value.length <= max ? value : value.slice(0, max - 1) + "\u2026";
  }

  function parseSource(text) {
    const root = [];
    const stack = [{ indent: -1, children: root }];
    const lines = text.replace(/\r\n/g, "\n").split("\n");

    for (const rawLine of lines) {
      if (!rawLine.trim()) continue;
      const match = rawLine.match(/^(\s*)(.*)$/);
      const spaces = match[1].replace(/\t/g, "  ").length;
      const indent = Math.floor(spaces / 2);
      const label = match[2].trim();
      const node = { label, children: [] };

      while (stack.length > 1 && indent <= stack[stack.length - 1].indent) {
        stack.pop();
      }

      stack[stack.length - 1].children.push(node);
      stack.push({ indent, children: node.children });
    }

    return root;
  }

  function relayout() {
    tree = parseSource(sourceEl.value);
    const depth = detailDepth(camera.zoom);
    rootLayout = [];
    let y = MARGIN;

    for (const node of tree) {
      rootLayout.push({
        node,
        x: MARGIN,
        y,
        width: NODE_W,
        height: NODE_H,
        visibleDepth: depth
      });
      y += NODE_H + ROOT_GAP;
    }

    world.width = Math.max(900, NODE_W + MARGIN * 2);
    world.height = Math.max(700, y + MARGIN);
    statusEl.textContent = `${tree.length} roots • depth ${depth} • zoom ${camera.zoom.toFixed(2)}x`;
  }

  function worldViewport(width, height) {
    return {
      left: (-camera.panX) / camera.zoom,
      top: (-camera.panY) / camera.zoom,
      right: (width - camera.panX) / camera.zoom,
      bottom: (height - camera.panY) / camera.zoom
    };
  }

  function inView(item, view) {
    return !(
      item.x + item.width < view.left - 220 ||
      item.y + item.height < view.top - 220 ||
      item.x > view.right + 220 ||
      item.y > view.bottom + 220
    );
  }

  function roundedRect(x, y, width, height, radius) {
    const r = Math.min(radius, width / 2, height / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + width, y, x + width, y + height, r);
    ctx.arcTo(x + width, y + height, x, y + height, r);
    ctx.arcTo(x, y + height, x, y, r);
    ctx.arcTo(x, y, x + width, y, r);
    ctx.closePath();
  }

  function childIntrinsicHeight(node, remainingDepth) {
    if (remainingDepth <= 0 || !node.children.length) return 0;
    return node.children.length * NODE_H + Math.max(0, node.children.length - 1) * CHILD_GAP;
  }

  function projectX(x) {
    return camera.panX + x * camera.zoom;
  }

  function projectY(y) {
    return camera.panY + y * camera.zoom;
  }

  function projectL(length) {
    return length * camera.zoom;
  }

  function drawNode(node, x, y, remainingDepth, scale) {
    const worldWidth = NODE_W * scale;
    const worldHeight = NODE_H * scale;
    const worldHeaderH = HEADER_H * scale;
    const width = projectL(worldWidth);
    const height = projectL(worldHeight);
    const headerH = projectL(worldHeaderH);
    const screenX = projectX(x);
    const screenY = projectY(y);
    const radius = Math.max(6, projectL(18 * scale));

    roundedRect(screenX, screenY, width, height, radius);
    ctx.fillStyle = remainingDepth > 0 ? "rgba(25, 37, 68, 0.92)" : "rgba(16, 24, 45, 0.96)";
    ctx.strokeStyle = remainingDepth > 0 ? "#7fb4ff" : "#5f7fb8";
    ctx.lineWidth = 1.4;
    ctx.fill();
    ctx.stroke();

    const pillX = screenX + projectL(LABEL_PILL_PAD_X * scale);
    const pillY = screenY + projectL(LABEL_PILL_PAD_Y * scale);
    const pillW = Math.min(width - projectL(LABEL_PILL_PAD_X * 2 * scale), projectL(LABEL_PILL_W * scale));
    const pillH = headerH;

    ctx.fillStyle = "rgba(255,255,255,0.04)";
    roundedRect(pillX, pillY, pillW, pillH, Math.max(5, radius * 0.45));
    ctx.fill();

    ctx.font = '10px "Courier New", monospace';
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#eef4ff";
    ctx.fillText(
      truncate(node.label, 18),
      pillX + projectL(8 * scale),
      pillY + pillH / 2
    );

    if (remainingDepth <= 0 || !node.children.length) {
      if (node.children.length) {
        ctx.font = '10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.textAlign = "center";
        ctx.fillStyle = "#98abd5";
        ctx.fillText(`${node.children.length} nested`, screenX + width / 2, screenY + height / 2 + projectL(10 * scale));
      }
      return;
    }

    const innerX = x + INNER_PAD_X * scale;
    const innerY = y + worldHeaderH + INNER_PAD_Y * scale;
    const innerW = worldWidth - INNER_PAD_X * 2 * scale;
    const innerH = worldHeight - worldHeaderH - INNER_PAD_Y * 2 * scale;
    const intrinsicH = childIntrinsicHeight(node, remainingDepth);
    const heightScale = intrinsicH > 0 ? innerH / intrinsicH : scale;
    const widthScale = innerW / NODE_W;
    const childScale = Math.min(heightScale, widthScale);
    const childGap = CHILD_GAP * childScale;
    const totalH = node.children.length * NODE_H * childScale + Math.max(0, node.children.length - 1) * childGap;
    let childY = innerY + Math.max(0, (innerH - totalH) / 2);

    for (const child of node.children) {
      const childX = innerX + (innerW - NODE_W * childScale) / 2;
      drawNode(child, childX, childY, remainingDepth - 1, childScale);
      childY += NODE_H * childScale + childGap;
    }
  }

  function ensureCanvasSize() {
    const width = viewportEl.clientWidth || 800;
    const height = viewportEl.clientHeight || 640;
    camera.dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(width * camera.dpr);
    canvas.height = Math.floor(height * camera.dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    return { width, height };
  }

  function draw() {
    const size = ensureCanvasSize();
    const view = worldViewport(size.width, size.height);

    ctx.setTransform(camera.dpr, 0, 0, camera.dpr, 0, 0);
    ctx.clearRect(0, 0, size.width, size.height);

    const bg = ctx.createLinearGradient(0, 0, 0, size.height);
    bg.addColorStop(0, "#121933");
    bg.addColorStop(1, "#0a0f1d");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, size.width, size.height);

    ctx.fillStyle = "rgba(113, 182, 255, 0.05)";
    ctx.beginPath();
    ctx.arc(projectX(world.width * 0.4), projectY(30), projectL(240), 0, Math.PI * 2);
    ctx.fill();

    for (const item of rootLayout) {
      if (!inView(item, view)) continue;
      drawNode(item.node, item.x, item.y, item.visibleDepth, 1);
    }
  }

  function scheduleDraw() {
    if (rafId) return;
    rafId = window.requestAnimationFrame(() => {
      rafId = 0;
      relayout();
      draw();
    });
  }

  function centerView() {
    const width = viewportEl.clientWidth || 800;
    camera.panX = Math.max(24, (width - world.width * Math.min(camera.zoom, 1)) / 2);
    camera.panY = 24;
  }

  sourceEl.addEventListener("input", scheduleDraw);
  sourceEl.addEventListener("keydown", (event) => {
    if (event.key !== "Tab") return;
    event.preventDefault();
    const start = sourceEl.selectionStart;
    const end = sourceEl.selectionEnd;
    sourceEl.value = sourceEl.value.slice(0, start) + "  " + sourceEl.value.slice(end);
    sourceEl.selectionStart = sourceEl.selectionEnd = start + 2;
    scheduleDraw();
  });

  viewportEl.addEventListener("wheel", (event) => {
    event.preventDefault();
    const rect = viewportEl.getBoundingClientRect();
    const localX = event.clientX - rect.left;
    const localY = event.clientY - rect.top;
    const worldX = (localX - camera.panX) / camera.zoom;
    const worldY = (localY - camera.panY) / camera.zoom;
    const nextZoom = Math.max(0.45, camera.zoom * (event.deltaY < 0 ? 1.14 : 0.88));
    camera.panX = localX - worldX * nextZoom;
    camera.panY = localY - worldY * nextZoom;
    camera.zoom = nextZoom;
    scheduleDraw();
  }, { passive: false });

  viewportEl.addEventListener("pointerdown", (event) => {
    drag = { x: event.clientX, y: event.clientY, panX: camera.panX, panY: camera.panY };
    viewportEl.setPointerCapture(event.pointerId);
  });

  viewportEl.addEventListener("pointermove", (event) => {
    if (!drag) return;
    camera.panX = drag.panX + (event.clientX - drag.x);
    camera.panY = drag.panY + (event.clientY - drag.y);
    scheduleDraw();
  });

  function stopDrag(event) {
    if (!drag) return;
    drag = null;
    if (viewportEl.hasPointerCapture(event.pointerId)) {
      viewportEl.releasePointerCapture(event.pointerId);
    }
  }

  viewportEl.addEventListener("pointerup", stopDrag);
  viewportEl.addEventListener("pointercancel", stopDrag);

  if (typeof window.ResizeObserver === "function") {
    resizeObserver = new window.ResizeObserver(() => scheduleDraw());
    resizeObserver.observe(viewportEl);
  } else {
    window.addEventListener("resize", scheduleDraw);
  }

  relayout();
  centerView();
  draw();
})();
</script>
</body>
</html>
